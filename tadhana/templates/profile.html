<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tadhana - Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Noto+Sans+Tagalog&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/styles.css"/>
</head>
<body>
<div class="stars-layer" id="stars"></div>
<div class="toast" id="toast"></div>
<nav>
  <a class="nav-brand" href="index.html">
    <div class="nav-orb"></div>
    <span class="nav-name">T A D H A N A</span>
  </a>
  <div class="nav-tabs">
    <a class="nav-tab" href="index.html">Main</a>
    <a class="nav-tab" href="personal-reading.html">Personal</a>
    <a class="nav-tab" href="three-cards.html">3 Cards</a>
    <a class="nav-tab" href="history.html">History</a>
  </div>
  <div class="nav-right">
    <a class="nav-profile-btn" href="profile.html">Profile</a>
    <div class="nav-avatar">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
    </div>
  </div>
</nav>
<main id="page-main" class="page active">
  <div style="max-width:760px;margin:0 auto;padding:56px 48px 80px;">
    <div class="about-eyebrow">Account</div>
    <h1 class="about-heading">Profile</h1>
    <section class="profile-panel">
      <div class="profile-avatar" id="profileAvatar">T</div>
      <div class="profile-info">
        <div class="profile-label">Name</div>
        <div class="profile-value" id="profileName">Tadhana User</div>
        <div class="profile-label">Email</div>
        <div class="profile-value" id="profileEmail">No email saved</div>
      </div>
      <button class="btn-deck btn-shuffle profile-logout" id="profileLogout" type="button">Logout</button>
    </section>
  </div>
</main>
<script src="/static/js/shared.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var name = localStorage.getItem('username') || 'Tadhana User';
    var email = localStorage.getItem('email') || 'No email saved';
    document.getElementById('profileName').textContent = name;
    document.getElementById('profileEmail').textContent = email;
    document.getElementById('profileAvatar').textContent = name.trim().charAt(0).toUpperCase() || 'T';
    document.getElementById('profileLogout').addEventListener('click', function() {
      localStorage.clear();
      window.location.href = '/login.html';
    });
  });
</script>
</body>
</html>
